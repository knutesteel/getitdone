                    { id: 4, author: 'RecoveringPerfectionist', stars: 5, date: 'April 4, 2026', title: 'Momentum over perfection changed everything', text: 'I spent years waiting for the perfect moment to start things. This book called me out in the most hilarious and loving way possible. "Five ugly minutes beats zero perfect ones" is tattooed on my brain now. Possibly on my arm soon.', upvotes: 52, downvotes: 2, voted: null },
                    { id: 5, author: 'SkepticalSam', stars: 3, date: 'April 2, 2026', title: 'Funny but not groundbreaking', text: 'Look, the writing is entertaining and the framework works. But at its core this is a priority matrix with better branding. If you already know the Eisenhower matrix, you might not learn much new. That said, the humor kept me reading when other books put me to sleep.', upvotes: 18, downvotes: 12, voted: null },
                    { id: 6, author: 'FrogEater2026', stars: 5, date: 'March 30, 2026', title: 'Eat the frog. Start ugly. Stack wins.', text: 'Three phrases from this book that I now say to myself every morning. The weekly reset idea alone was worth the price. I actually look forward to reviewing my week instead of dreading it. Also the -1 points for busywork is savage and perfect.', upvotes: 41, downvotes: 0, voted: null },
                    { id: 7, author: 'CorporateDrone_NoMore', stars: 4, date: 'March 28, 2026', title: 'Anti-corporate productivity at its best', text: 'Finally a productivity system that doesn\'t feel like it was designed by a management consultant. It\'s for actual humans who sometimes reorganize their desk to avoid real work. The "Squirrel!" category for unplanned wins is genius.', upvotes: 33, downvotes: 4, voted: null },
                    { id: 8, author: 'NightOwlNancy', stars: 5, date: 'March 25, 2026', title: 'Read it at 2am. Started getting stuff done at 2:15am.', text: 'I bought this on impulse at midnight, read it in one sitting, and immediately reorganized my entire task list using the matrix. My husband thought I was having a breakdown. Nope - just finally had a system that matched my chaotic energy.', upvotes: 44, downvotes: 1, voted: null }
                ]);

                const handleVote = (reviewId, direction) => {
                    setReviews(reviews.map(r => {
                        if (r.id !== reviewId) return r;
                        if (r.voted === direction) return r; // already voted this way
                        const undo = r.voted !== null; // undoing previous vote
                        return {
                            ...r,
                            upvotes: direction === 'up' ? r.upvotes + 1 : (undo ? r.upvotes - 1 : r.upvotes),
                            downvotes: direction === 'down' ? r.downvotes + 1 : (undo ? r.downvotes - 1 : r.downvotes),
                            voted: direction
                        };
                    }));
                };

                const renderStars = (count) => {
                    return '★'.repeat(count) + '☆'.repeat(5 - count);
                };

                return (
                    <div style={{ maxWidth: '600px', margin: '0 auto' }}>
                        <MemeBanner viewName="reviews" />
                        <div className="gsd-header">
                            <div className="gsd-title" style={{ fontSize: '28px' }}>Reviews</div>
                            <div className="gsd-tagline">What readers are saying about Get Sh*t Done</div>
                        </div>

                        <div style={{ display: 'flex', gap: '8px', marginBottom: '20px' }}>
                            <button
                                onClick={() => window.open(AMAZON_URL, '_blank')}
                                style={{ flex: 1, padding: '14px', background: '#f5c518', color: '#1a1a1a', border: 'none', borderRadius: '10px', fontWeight: 800, fontSize: '14px', cursor: 'pointer', textTransform: 'uppercase', letterSpacing: '0.5px' }}
                            >
                                ⭐ Leave a Review on Amazon
                            </button>
                        </div>

                        <div style={{ background: '#fff8e1', borderRadius: '10px', padding: '14px 16px', marginBottom: '20px', fontSize: '13px', color: '#444', lineHeight: 1.5 }}>
                            <strong>🏆 Weekly Review Contest</strong> — Leave a review, earn +5 points. The most upvoted review each week wins. Vote for your favorites below!
                        </div>

                        <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                            {reviews.sort((a, b) => (b.upvotes - b.downvotes) - (a.upvotes - a.downvotes)).map(review => (
                                <div key={review.id} style={{ background: 'white', borderRadius: '12px', padding: '16px', border: '1px solid #e0dcd4' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '8px' }}>
                                        <div>
                                            <div style={{ fontSize: '15px', fontWeight: 700, color: '#1a1a1a', marginBottom: '2px' }}>{review.title}</div>
                                            <div style={{ fontSize: '12px', color: '#f5a623', letterSpacing: '1px' }}>{renderStars(review.stars)}</div>
                                        </div>
                                        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '2px', minWidth: '50px' }}>
                                            <button onClick={() => handleVote(review.id, 'up')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '18px', opacity: review.voted === 'up' ? 1 : 0.4, padding: '2px' }}>👍</button>
                                            <div style={{ fontSize: '13px', fontWeight: 700, color: (review.upvotes - review.downvotes) > 0 ? '#22c55e' : (review.upvotes - review.downvotes) < 0 ? '#ef4444' : '#666' }}>
                                                {review.upvotes - review.downvotes > 0 ? '+' : ''}{review.upvotes - review.downvotes}
                                            </div>
                                            <button onClick={() => handleVote(review.id, 'down')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '18px', opacity: review.voted === 'down' ? 1 : 0.4, padding: '2px' }}>👎</button>
                                        </div>
                                    </div>
                                    <div style={{ fontSize: '13px', color: '#444', lineHeight: 1.6, marginBottom: '8px' }}>{review.text}</div>
                                    <div style={{ fontSize: '11px', color: '#999' }}>
                                        by <strong>{review.author}</strong> — {review.date}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div style={{ textAlign: 'center', marginTop: '24px', marginBottom: '16px' }}>
                            <button
                                onClick={() => window.open(AMAZON_URL, '_blank')}
                                style={{ padding: '12px 32px', background: '#1a1a1a', color: '#f5c518', border: 'none', borderRadius: '8px', fontWeight: 700, fontSize: '13px', cursor: 'pointer' }}
                            >
                                See All Reviews on Amazon →
                            </button>
                        </div>
                    </div>
                );
            }

            function WinsView() {
                const [selectedReward, setSelectedReward] = useState(null);
                const [rewards, setRewards] = useState([
                    { id: 1, name: 'Coffee', reason: 'I earned a fucking break', points: 5 },
                    { id: 2, name: 'Nap', reason: 'Sleep is productivity', points: 3 },
                    { id: 3, name: 'Smug Self-Satisfaction', reason: 'Free and priceless', points: 0 }
                ]);

                return (
                    <div className="wins-container">
                        <MemeBanner viewName="wins" />
                        <div className="gsd-header">
                            <div className="gsd-title" style={{ fontSize: '32px' }}>Wins</div>
                            <div className="gsd-tagline">Look what you did</div>
                        </div>

                        {/* Total Score */}
                        <div className="total-score-box">
                            <div className="total-score-value">{totalScore}</div>
                            <div className="total-score-label">Total Score</div>
                        </div>

                        {/* Rewards Section */}
                        <div className="wins-section">
                            <div className="wins-section-title">Damn I'm Good – Look What I Get</div>
                            <div className="rewards-grid">
                                {rewards.map(reward => (
                                    <div key={reward.id} className="reward-card">
                                        <div className="reward-name">{reward.name}</div>
                                        <div className="reward-reason">{reward.reason}</div>
                                        <div className="reward-points">
                                            {reward.points > 0 ? `+${reward.points} pts` : 'Priceless'}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Completed Tasks */}
                        <div className="wins-section">
                            <div className="wins-section-title">Completed Tasks</div>
                            {completedTasks.length === 0 ? (
                                <div className="empty-state">
                                    <div className="empty-state-text">Complete a task to see it here.</div>
                                </div>
                            ) : (
                                <div className="completed-tasks-list">
                                    {completedTasks.slice().reverse().map(task => {
                                        const cat = Object.values(CATEGORIES).find(c => c.id === task.category);
                                        return (
                                            <div key={task.id} className="completed-task-item">
                                                <div className="completed-task-name">{task.text}</div>
                                                <div className="completed-task-points">
                                                    {cat?.points || 0} pts
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>

                        {/* Reflection Section */}
                        <div className="wins-section">
                            <div className="reflection-section">
                                <div className="reflection-title">What Was I Thinking?</div>
                                <div className="reflection-items">
                                    <div className="reflection-item">
                                        "Do → celebrate → repeat. The momentum loop is your best friend."
                                    </div>
                                    <div className="reflection-item">
                                        "A +1 day beats a zero."
                                    </div>
                                    <div className="reflection-item">
                                        "The scoreboard doesn't judge you. It just keeps score. And somehow, that's enough."
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            function TaskItem({ task, onToggle, onDelete, onEdit }) {
                const category = CATEGORIES[task.category];

                return (
                    <div className={`task-item ${task.completed ? 'completed' : ''}`}>
                        <div className={`task-checkbox ${task.completed ? 'checked' : ''}`} onClick={onToggle}>
                            {task.completed && '✓'}
                        </div>
                        <div className="task-content" onClick={() => onEdit && onEdit(task)} style={{cursor: onEdit ? 'pointer' : 'default'}}>
                            <div className="task-text">{task.text}</div>
                            <div className="task-category">{category.emoji} {category.name}</div>
                            {task.notes && <div className="task-notes-preview">📝 {task.notes}</div>}
                            <div className="task-badges">
                                {category.points > 0 && (
                                    <div className="badge badge-positive">+{category.points} pts</div>
                                )}
                                {category.points < 0 && (
                                    <div className="badge badge-negative">{category.points} pts</div>
                                )}
                                {category.points === 0 && (
                                    <div className="badge badge-neutral">0 pts</div>
                                )}
                            </div>
                        </div>
                        <div className="task-actions">
                            <button className="btn-small" onClick={onToggle}>
                                {task.completed ? 'Undo' : 'Done'}
                            </button>
                            <button className="btn-delete" onClick={onDelete}>
                                Delete
                            </button>
                        </div>
                    </div>
                );
            }

            function ResetModal({ isOpen, tasks: resetTasks, onClose, onAction }) {
                return (
                    <div className={`modal ${isOpen ? 'active' : ''}`}>
                        <div className="modal-content">
                            <div className="modal-title">Weekly Reset</div>
                            <div style={{ fontSize: '12px', color: '#666', marginBottom: '16px', lineHeight: '1.6' }}>
                                <strong>"What got done? What's still real? What can I kill?"</strong>
                                <br />
                                <br />
                                If a task has survived three resets without moving, it's not a task—it's a guilt souvenir. Throw it out.
                                <br />
                                <br />
                                Fifteen minutes of honest accounting beats seven days of productive-looking chaos.
                            </div>

                            <div className="reset-items">
                                {resetTasks.length === 0 ? (
                                    <div className="empty-state">
                                        <div className="empty-state-text">All tasks reviewed. You're all set!</div>
                                    </div>
                                ) : (
                                    resetTasks.map(task => (
                                        <div key={task.id} className="reset-item">
                                            <div className="reset-item-text">
                                                <strong>{task.text}</strong>
                                                <br />
                                                <span style={{ fontSize: '11px', color: '#999' }}>
                                                    {CATEGORIES[task.category]?.name}
                                                </span>
                                            </div>
                                            <div className="reset-action">
                                                <button
                                                    className="reset-btn-small"
                                                    onClick={() => onAction(task.id, 'keep')}
                                                >
                                                    Keep
                                                </button>
                                                <button
                                                    className="reset-btn-small"
                                                    onClick={() => onAction(task.id, 'reschedule')}
                                                >
                                                    Reschedule
                                                </button>
                                                <button
                                                    className="reset-btn-small"
                                                    onClick={() => onAction(task.id, 'kill')}
                                                >
                                                    Kill
                                                </button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>

                            <div className="modal-buttons">
                                <button className="btn-secondary" onClick={onClose}>
                                    Close
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }
        }

        // Error boundary
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, info) {
                console.error('App Error:', error, info);
            }
            render() {
                if (this.state.hasError) {
                    return React.createElement('div', {style: {padding: '40px', fontFamily: 'monospace', color: 'red'}},
                        React.createElement('h2', null, 'Something went wrong'),
                        React.createElement('pre', null, this.state.error?.toString()),
                        React.createElement('pre', null, this.state.error?.stack)
                    );
                }
                return this.props.children;
            }
        }

        // Render the app
        ReactDOM.render(<ErrorBoundary><GetShitDoneApp /></ErrorBoundary>, document.getElementById('root'));
    </script>
</body>
</html>
