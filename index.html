            function MatrixView() {
                const [newTaskText, setNewTaskText] = useState({});
                const [draggedTask, setDraggedTask] = useState(null);

                const handleAddTask = (category) => {
                    addTask(category, newTaskText[category] || '');
                    setNewTaskText({ ...newTaskText, [category]: '' });
                };

                const handleDragStart = (e, task) => {
                    setDraggedTask(task);
                    e.dataTransfer.effectAllowed = 'move';
                };

                const handleDragOver = (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                };

                const handleDrop = (e, targetCategory) => {
                    e.preventDefault();
                    if (draggedTask && draggedTask.category !== targetCategory) {
                        const task = tasks[draggedTask.category].find(t => t.id === draggedTask.id);
                        if (task) {
                            setTasks({
                                ...tasks,
                                [draggedTask.category]: tasks[draggedTask.category].filter(t => t.id !== draggedTask.id),
                                [targetCategory]: [...tasks[targetCategory], { ...task, category: targetCategory }]
                            });
                        }
                    }
                    setDraggedTask(null);
                };

                return (
                    <div>
                        <MemeBanner viewName="matrix" />
                        <h2 style={{ fontSize: '18px', fontWeight: '700', marginBottom: '16px' }}>
                            The Get-Your-Sh*t-Together Matrix
                        </h2>

                        <div className="matrix-container">
                            {Object.values(CATEGORIES)
                                .filter(cat => cat.id !== 'rewards' && cat.id !== 'reflection')
                                .map(category => (
                                    <div key={category.id} className="matrix-column">
                                        <div className="matrix-column-title">{category.name}</div>
                                        <div className="matrix-points">
                                            {category.points > 0 ? `+${category.points}` : category.points} Points
                                        </div>

                                        <div className="matrix-add-task">
                                            <input
                                                type="text"
                                                className="matrix-add-input"
                                                placeholder="Add task..."
                                                value={newTaskText[category.id] || ''}
                                                onChange={(e) => setNewTaskText({ ...newTaskText, [category.id]: e.target.value })}
                                                onKeyPress={(e) => e.key === 'Enter' && handleAddTask(category.id)}
                                            />
                                            <button
                                                className="matrix-add-btn"
                                                onClick={() => handleAddTask(category.id)}
                                            >
                                                +
                                            </button>
                                        </div>

                                        <div
                                            className="matrix-tasks"
                                            onDragOver={handleDragOver}
                                            onDrop={(e) => handleDrop(e, category.id)}
                                        >
                                            {tasks[category.id]?.map(task => (
                                                <div
                                                    key={task.id}
                                                    className="matrix-task"
                                                    draggable
                                                    onDragStart={(e) => handleDragStart(e, task)}
                                                    style={{
                                                        opacity: draggedTask?.id === task.id ? 0.5 : 1
                                                    }}
                                                >
                                                    <div
                                                        style={{ fontSize: '12px', fontWeight: '600', marginBottom: '4px', cursor: 'pointer' }}
                                                        onClick={() => setEditingTask({...task})}

                                                        {task.text}
                                                        {task.notes && <div style={{fontSize:'10px', color:'#888', marginTop:'2px'}}>📝 {task.notes.substring(0, 30)}{task.notes.length > 30 ? '...' : ''}</div>}
                                                    </div>
                                                    <div style={{ display: 'flex', gap: '4px' }}>
                                                        <button
                                                            className="btn-small"
                                                            onClick={() => toggleTask(task.id)}
                                                            style={{ flex: 1 }}
                                                        >
                                                            {task.completed ? 'Undo' : 'Done'}
                                                        </button>
                                                        <button
                                                            className="btn-delete"
                                                            onClick={() => deleteTask(task.id)}
                                                            style={{ flex: 1 }}
                                                        >
                                                            Delete
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                        </div>
                    </div>
                );
            }

            function DoneView() {
                const getCompletedTasksByDate = () => {
                    const now = new Date();
                    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    const yesterday = new Date(today);
                    yesterday.setDate(yesterday.getDate() - 1);
                    const weekAgo = new Date(today);
                    weekAgo.setDate(weekAgo.getDate() - 7);

                    const grouped = {
                        today: [],
                        yesterday: [],
                        thisWeek: [],
                        earlier: []
                    };

                    completedTasks.forEach(task => {
                        const taskDate = new Date(new Date(task.completedAt).getFullYear(), new Date(task.completedAt).getMonth(), new Date(task.completedAt).getDate());

                        if (taskDate.getTime() === today.getTime()) {
                            grouped.today.push(task);
                        } else if (taskDate.getTime() === yesterday.getTime()) {
                            grouped.yesterday.push(task);
                        } else if (taskDate >= weekAgo) {
                            grouped.thisWeek.push(task);
                        } else {
                            grouped.earlier.push(task);
                        }
                    });

                    return grouped;
                };

                const filterTasks = (tasks) => {
                    return tasks.filter(t => {
                        const cat = Object.values(CATEGORIES).find(c => c.id === t.category);
                        if (donePointFilter === 'all') return true;
                        return cat?.points === parseInt(donePointFilter);
                    });
                };

                const grouped = getCompletedTasksByDate();
                const totalCompleted = completedTasks.length;
                const totalPoints = completedTasks.reduce((sum, t) => {
                    const cat = Object.values(CATEGORIES).find(c => c.id === t.category);
                    return sum + (cat?.points || 0);
                }, 0);

                return (
                    <div className="done-container">
                        <MemeBanner viewName="done" />
                        <div className="done-header">Completed Items</div>

                        <div className="done-stats">
                            <div className="done-stat">
                                <div className="done-stat-value">{totalCompleted}</div>
                                <div className="done-stat-label">Total Done</div>
                            </div>
                            <div className="done-stat">
                                <div className="done-stat-value">{totalPoints}</div>
                                <div className="done-stat-label">Total Points</div>
                            </div>
                        </div>

                        <div className="done-filters">
                            <button
                                className={`done-filter-btn ${donePointFilter === 'all' ? 'active' : ''}`}
                                onClick={() => setDonePointFilter('all')}
                            >
                                All
                            </button>
                            <button
                                className={`done-filter-btn ${donePointFilter === '3' ? 'active' : ''}`}
                                onClick={() => setDonePointFilter('3')}
                            >
                                +3
                            </button>
                            <button
                                className={`done-filter-btn ${donePointFilter === '2' ? 'active' : ''}`}
                                onClick={() => setDonePointFilter('2')}
                            >
                                +2
                            </button>
                            <button
                                className={`done-filter-btn ${donePointFilter === '1' ? 'active' : ''}`}
                                onClick={() => setDonePointFilter('1')}
                            >
                                +1
                            </button>
                            <button
                                className={`done-filter-btn ${donePointFilter === '-1' ? 'active' : ''}`}
                                onClick={() => setDonePointFilter('-1')}
                            >
                                -1
                            </button>
                        </div>

                        {completedTasks.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-state-icon">✨</div>
                                <div className="empty-state-text">Complete a task to see it here.</div>
                            </div>
                        ) : (
                            <>
                                {filterTasks(grouped.today).length > 0 && (
                                    <DoneGroup
                                        title="Today"
                                        tasks={filterTasks(grouped.today)}
                                        getCategoryColor={getCategoryColor}
                                    />
                                )}
                                {filterTasks(grouped.yesterday).length > 0 && (
                                    <DoneGroup
                                        title="Yesterday"
                                        tasks={filterTasks(grouped.yesterday)}
                                        getCategoryColor={getCategoryColor}
                                    />
                                )}
                                {filterTasks(grouped.thisWeek).length > 0 && (
                                    <DoneGroup
                                        title="This Week"
                                        tasks={filterTasks(grouped.thisWeek)}
                                        getCategoryColor={getCategoryColor}
                                    />
                                )}
                                {filterTasks(grouped.earlier).length > 0 && (
                                    <DoneGroup
                                        title="Earlier"
                                        tasks={filterTasks(grouped.earlier)}
                                        getCategoryColor={getCategoryColor}
                                    />
                                )}
                            </>
                        )}
                    </div>
                );

                function DoneGroup({ title, tasks, getCategoryColor }) {
                    const groupPoints = tasks.reduce((sum, t) => {
                        const cat = Object.values(CATEGORIES).find(c => c.id === t.category);
                        return sum + (cat?.points || 0);
                    }, 0);

                    return (
                        <div className="done-group">
                            <div className="done-group-header">
                                {title}
                                <span className="done-group-total"> ({tasks.length} items, {groupPoints} points)</span>
                            </div>
                            {tasks.slice().reverse().map(task => {
                                const cat = Object.values(CATEGORIES).find(c => c.id === task.category);
                                return (
                                    <div
                                        key={task.id}
                                        className="done-item"
                                        style={{ borderLeftColor: getCategoryColor(task.category) }}
                                    >
                                        <div className="done-item-left">
                                            <div className="done-item-text">{task.text}</div>
                                            <div className="done-item-meta">{cat?.name}</div>
                                        </div>
                                        <div className="done-item-points" style={{ color: getCategoryColor(task.category) }}>
                                            {cat?.points > 0 ? '+' : ''}{cat?.points}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    );
                }
            }

            function CalendarView() {
                const monthDays = new Date(calendarDate.getFullYear(), calendarDate.getMonth() + 1, 0).getDate();

                const allTasksFlat = Object.values(tasks).flat();

                        const taskDate = new Date(t.dueDate);
                        return taskDate.toDateString() === date.toDateString();
                    });
                };

                const handlePrevMonth = () => {
                    setCalendarDate(new Date(calendarDate.getFullYear(), calendarDate.getMonth() - 1, 1));
                    setSelectedDayTasks(null);
                };

                const handleNextMonth = () => {
                    setCalendarDate(new Date(calendarDate.getFullYear(), calendarDate.getMonth() + 1, 1));
                    setSelectedDayTasks(null);
                };

                const handleDayClick = (day) => {
                    const clickedDate = new Date(calendarDate.getFullYear(), calendarDate.getMonth(), day);
                    setSelectedDayTasks(tasksForDate(clickedDate));
                };

                const renderCalendarDays = () => {
                    const days = [];
                    const today = new Date();

                    for (let i = 0; i < firstDayOfMonth; i++) {
                        days.push(<div key={`empty-${i}`} className="calendar-day" style={{ opacity: 0.3 }}></div>);
                    }

                    for (let day = 1; day <= monthDays; day++) {
                        const cellDate = new Date(calendarDate.getFullYear(), calendarDate.getMonth(), day);
                        const isToday = cellDate.toDateString() === today.toDateString();
                        const dayTasks = tasksForDate(cellDate);
                        const hasTasksForDay = dayTasks.length > 0;

                        days.push(
                            <div
                                key={day}
                                className={`calendar-day ${isToday ? 'today' : ''}`}
                                onClick={() => handleDayClick(day)}
                            >
                                <div className="calendar-day-number">{day}</div>
                                {hasTasksForDay && (
                                    <div className="calendar-day-indicators">
                                        {dayTasks.slice(0, 3).map((task, idx) => (
                                            <div key={idx} className="calendar-day-dot" style={{ backgroundColor: getCategoryColor(task.category) }}></div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        );
                    }

                    return days;
                };

                    <div style={{display:'flex',gap:'8px',marginBottom:'20px'}}>
                        {['day','week','month'].map(v => (
                            <button key={v} onClick={() => setCalendarView(v)}

                                    flex:1, padding:'10px', border: calendarView===v ? '2px solid #f5c518' : '2px solid #ddd',
                                    borderRadius:'6px', background: calendarView===v ? '#f5c518' : '#fff',
                                    color: calendarView===v ? '#1a1a1a' : '#666', fontWeight:700, fontSize:'12px',
                                    textTransform:'uppercase', letterSpacing:'0.5px', cursor:'pointer'
                                }}
                            >{v}</button>
                        ))}
                    </div>
                );

                if (calendarView === 'month') {
                    return (
                        <div className="calendar-container">
                            <MemeBanner viewName="calendar" />
                            {viewSwitcher}
                            <div className="calendar-header">
                                <button className="calendar-nav-btn" onClick={handlePrevMonth}>← Previous</button>
                                <div className="calendar-title">
                                    {calendarDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}
                                </div>
                                <button className="calendar-nav-btn" onClick={handleNextMonth}>Next →</button>
                            </div>

                            <div className="calendar-month">
                                <div className="calendar-weekdays">
                                    {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => (
                                        <div key={day} className="calendar-weekday">{day}</div>

                                </div>
                                <div className="calendar-days">
                                    {renderCalendarDays()}
                                </div>
                            </div>

                            {selectedDayTasks && (
                                <div style={{ marginTop: '20px' }}>
                                    <h3 style={{ fontSize: '14px', fontWeight: '700', marginBottom: '12px' }}>Tasks for this day:</h3>

                                        <div className="empty-state">

                                            <TaskItem

                                                task={task}
                                                onToggle={() => toggleTask(task.id)}

                                                onEdit={(task) => setEditingTask({...task})}
                                            />
                                        ))
                                    )}
                                </div>
                            )}
                        </div>
                    );
                } else if (calendarView === 'week') {
                    const weekStart = new Date(calendarDate);
                    weekStart.setDate(weekStart.getDate() - weekStart.getDay());

                    return (
                        <div className="calendar-container">
                            {viewSwitcher}
                            <div className="calendar-header">
                                <button className="calendar-nav-btn" onClick={() => setCalendarDate(new Date(calendarDate.getTime() - 7 * 24 * 60 * 60 * 1000))}>← Previous</button>
                                <div className="calendar-title">
                                    {weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - {new Date(weekStart.getTime() + 6 * 24 * 60 * 60 * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
                                </div>
                                <button className="calendar-nav-btn" onClick={() => setCalendarDate(new Date(calendarDate.getTime() + 7 * 24 * 60 * 60 * 1000))}>Next →</button>
                            </div>

                            <div className="calendar-week">
                                {[0, 1, 2, 3, 4, 5, 6].map(day => {
                                    const date = new Date(weekStart.getTime() + day * 24 * 60 * 60 * 1000);
                                    const dayTasks = tasksForDate(date);
                                    return (
                                        <div key={day} className="calendar-week-day">
                                            <div className="calendar-week-day-header">
                                                <div className="calendar-week-day-name">
                                                    {date.toLocaleDateString('en-US', { weekday: 'short' })}
                                                </div>
                                                <div className="calendar-week-day-date">
                                                    {date.getDate()}
                                                </div>
                                            </div>
                                            <div className="calendar-week-tasks">
                                                {dayTasks.map(task => (

                                                        style={{ borderLeftColor: getCategoryColor(task.category) }}
                                                    >
                                                        <div style={{ fontSize: '10px', color: '#666' }}>{CATEGORIES[task.category]?.emoji}</div>
                                                        <div style={{ fontSize: '11px', fontWeight: '600' }}>{task.text}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                })}
                            </div>
                        </div>
                    );
                } else {
                    const dayTasks = tasksForDate(calendarDate);

                    return (
                        <div className="calendar-container">
                            {viewSwitcher}
                            <div className="calendar-header">
                                <button className="calendar-nav-btn" onClick={() => setCalendarDate(new Date(calendarDate.getTime() - 24 * 60 * 60 * 1000))}>← Previous Day</button>
                                <div className="calendar-title">
                                    {calendarDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}
                                </div>
                                <button className="calendar-nav-btn" onClick={() => setCalendarDate(new Date(calendarDate.getTime() + 24 * 60 * 60 * 1000))}>Next Day →</button>
                            </div>

                            <div className="calendar-day-large">
                                <div className="calendar-day-large-date">{calendarDate.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</div>
                                <div className="calendar-day-large-label">{calendarDate.toLocaleDateString('en-US', { weekday: 'long' })}</div>
                            </div>

                            {dayTasks.length === 0 ? (
                                <div className="empty-state">
                                    <div className="empty-state-icon">✨</div>
                                    <div className="empty-state-text">No tasks scheduled for this day.</div>

            function AdminView() {
                const [users, setUsers] = useState([]);
                const [loading, setLoading] = useState(true);
                const [err, setErr] = useState('');
                const [busyUid, setBusyUid] = useState(null);

                React.useEffect(() => {
                    setLoading(true);
                    const unsub = firebase.firestore().collection('users').onSnapshot(snap => {
                        const list = [];
                        snap.forEach(d => list.push({ uid: d.id, ...d.data() }));
                        list.sort((a, b) => {
                            const aTs = (a.lastSeen && a.lastSeen.toMillis) ? a.lastSeen.toMillis() : 0;
                            const bTs = (b.lastSeen && b.lastSeen.toMillis) ? b.lastSeen.toMillis() : 0;
                            return bTs - aTs;
                        });
                        setUsers(list);
                        setLoading(false);
                    }, (e) => { setErr(e.message); setLoading(false); });
                    return () => unsub();
                }, []);

                const updateSub = (uid, plan) => {
                    setBusyUid(uid);
                    firebase.firestore().collection('users').doc(uid).update({
                        subscription: plan,
                        subscriptionGrantedBy: ADMIN_EMAIL,
                        subscriptionUpdatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }).catch(e => alert('Update failed: ' + e.message))
                      .finally(() => setBusyUid(null));
                };

                const fmtTs = (ts) => {
                    if (!ts || !ts.toDate) return '—';
                    return ts.toDate().toLocaleString();
                };

                const card = { background: '#1a1a1a', borderRadius: '12px', padding: '16px', border: '1px solid #333' };
                const statBig = { fontSize: '28px', fontWeight: 900, color: '#f5c518', lineHeight: 1 };
                const statLabel = { fontSize: '11px', color: '#aaa', textTransform: 'uppercase', letterSpacing: '1px', marginTop: '6px' };
                const th = { fontSize: '10px', color: '#aaa', textTransform: 'uppercase', letterSpacing: '1px', textAlign: 'left', padding: '10px 8px', borderBottom: '1px solid #333' };
                const td = { fontSize: '13px', color: '#eee', padding: '10px 8px', borderBottom: '1px solid #222' };

                const totalUsers = users.length;
                const paidUsers = users.filter(u => ['monthly', 'yearly', 'lifetime'].includes(u.subscription)).length;
                const lifetimeUsers = users.filter(u => u.subscription === 'lifetime').length;
                const conversion = totalUsers ? (paidUsers / totalUsers) : 0;
                const fmtPct = (n) => (n * 100).toFixed(1) + '%';

                return (
                    <div style={{ padding: '20px', maxWidth: '1100px', margin: '0 auto', color: '#eee' }}>
                        <div style={{ marginBottom: '16px' }}>
                            <div style={{ fontSize: '32px', fontWeight: 900, color: '#f5c518' }}>Admin</div>
                            <div style={{ fontSize: '13px', color: '#999' }}>Live data from Firestore · Authenticated as <b style={{ color: '#f5c518' }}>{loginEmail}</b></div>
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '12px', marginBottom: '20px' }}>
                            <div style={card}><div style={statBig}>{totalUsers}</div><div style={statLabel}>Total Users</div></div>
                            <div style={card}><div style={statBig}>{paidUsers}</div><div style={statLabel}>Paid</div></div>
                            <div style={card}><div style={statBig}>{lifetimeUsers}</div><div style={statLabel}>Lifetime</div></div>
                            <div style={card}><div style={statBig}>{fmtPct(conversion)}</div><div style={statLabel}>Conversion</div></div>
                        </div>

                        <div style={{ ...card, padding: 0, overflow: 'hidden' }}>
                            <div style={{ padding: '16px', borderBottom: '1px solid #333', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <div style={{ fontSize: '16px', fontWeight: 800, color: '#f5c518' }}>Registered users</div>
                                {loading && <div style={{ fontSize: '12px', color: '#aaa' }}>Loading...</div>}
                                {err && <div style={{ fontSize: '12px', color: '#c0392b' }}>{err}</div>}
                            </div>
                            <div style={{ overflowX: 'auto' }}>
                                <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: '780px' }}>
                                    <thead>
                                        <tr>
                                            <th style={th}>Email</th>
                                            <th style={th}>Plan</th>
                                            <th style={th}>Created</th>
                                            <th style={th}>Last Seen</th>
                                            <th style={{ ...th, textAlign: 'right' }}>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {users.length === 0 && !loading && (
                                            <tr><td style={td} colSpan={5}>No users yet.</td></tr>
                                        )}
                                        {users.map(u => {
                                            const planColor = u.subscription === 'lifetime' ? '#f5c518' :
                                                              u.subscription === 'yearly' ? '#a6e22e' :
                                                              u.subscription === 'monthly' ? '#66d9ef' : '#777';
                                            const isBusy = busyUid === u.uid;
                                            return (
                                                <tr key={u.uid}>
                                                    <td style={td}>{u.email || '—'}</td>
                                                    <td style={td}>
                                                        <span style={{ background: planColor, color: '#1a1a1a', padding: '2px 8px', borderRadius: '4px', fontSize: '11px', fontWeight: 800, textTransform: 'uppercase' }}>
                                                            {u.subscription || 'free'}
                                                        </span>
                                                    </td>
                                                    <td style={td}>{fmtTs(u.createdAt)}</td>
                                                    <td style={td}>{fmtTs(u.lastSeen)}</td>
                                                    <td style={{ ...td, textAlign: 'right' }}>
                                                        {u.subscription !== 'lifetime' && (
                                                            <button
                                                                onClick={() => updateSub(u.uid, 'lifetime')}
                                                                disabled={isBusy}
                                                                style={{ background: '#f5c518', color: '#1a1a1a', border: 'none', padding: '6px 10px', borderRadius: '6px', fontWeight: 800, fontSize: '11px', cursor: 'pointer', marginRight: '4px' }}>
                                                                {isBusy ? '...' : 'Grant Lifetime'}
                                                            </button>
                                                        )}
                                                        {u.subscription !== 'free' && (
                                                            <button
                                                                onClick={() => updateSub(u.uid, 'free')}
                                                                disabled={isBusy}
                                                                style={{ background: 'transparent', color: '#aaa', border: '1px solid #444', padding: '6px 10px', borderRadius: '6px', fontWeight: 700, fontSize: '11px', cursor: 'pointer' }}>
                                                                Downgrade
                                                            </button>
                                                        )}
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div style={{ marginTop: '20px' }}>
                            <button
                                onClick={deleteAllSampleData}
                                style={{ background: '#c0392b', color: 'white', border: 'none', padding: '10px 16px', borderRadius: '8px', fontWeight: 800, fontSize: '13px', cursor: 'pointer', textTransform: 'uppercase', letterSpacing: '1px' }}>
                                Delete Sample Data (my account)
                            </button>
                        </div>

                        <div style={{ fontSize: '11px', color: '#777', marginTop: '16px' }}>
                            User docs live in Firestore <code>/users/&#123;uid&#125;</code>. Only authenticated admins can see this page.
                        </div>
                    </div>
                );
            }

                    { id: 6, author: 'FrogEater2026', stars: 5, date: 'March 30, 2026', title: 'Eat the frog. Start ugly. Stack wins.', text: 'Three phrases from this book that I now say to myself every morning. The weekly reset idea alone was worth the price. I actually look forward to reviewing my week instead of dreading it. Also the -1 points for busywork is savage and perfect.', upvotes: 41, downvotes: 0, voted: null },
                    { id: 7, author: 'CorporateDrone_NoMore', stars: 4, date: 'March 28, 2026', title: 'Anti-corporate productivity at its best', text: 'Finally a productivity system that doesn\'t feel like it was designed by a management consultant. It\'s for actual humans who sometimes reorganize their desk to avoid real work. The "Squirrel!" category for unplanned wins is genius.', upvotes: 33, downvotes: 4, voted: null },
                    { id: 8, author: 'NightOwlNancy', stars: 5, date: 'March 25, 2026', title: 'Read it at 2am. Started getting stuff done at 2:15am.', text: 'I bought this on impulse at midnight, read it in one sitting, and immediately reorganized my entire task list using the matrix. My husband thought I was having a breakdown. Nope - just finally had a system that matched my chaotic energy.', upvotes: 44, downvotes: 1, voted: null }

                                    <div key={reward.id} className="reward-card">
                                        <div className="reward-name">{reward.name}</div>
                                        <div className="reward-reason">{reward.reason}</div>
                                        <div className="reward-points">
                                            {reward.points > 0 ? `+${reward.points} pts` : 'Priceless'}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Completed Tasks */}
                        <div className="wins-section">
                            <div className="wins-section-title">Completed Tasks</div>
                            {completedTasks.length === 0 ? (
                                <div className="empty-state">
                                    <div className="empty-state-text">Complete a task to see it here.</div>
                                </div>
                            ) : (
                                <div className="completed-tasks-list">
                                    {completedTasks.slice().reverse().map(task => {
                                        const cat = Object.values(CATEGORIES).find(c => c.id === task.category);
                                        return (
                                            <div key={task.id} className="completed-task-item">
                                                <div className="completed-task-name">{task.text}</div>
                                                <div className="completed-task-points">
                                                    {cat?.points || 0} pts
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>

                        {/* Reflection Section */}
                        <div className="wins-section">
                            <div className="reflection-section">
                                <div className="reflection-title">What Was I Thinking?</div>
                                <div className="reflection-items">
                                    <div className="reflection-item">
                                        "Do → celebrate → repeat. The momentum loop is your best friend."
                                    </div>
                                    <div className="reflection-item">
                                        "A +1 day beats a zero."
                                    </div>
                                    <div className="reflection-item">
                                        "The scoreboard doesn't judge you. It just keeps score. And somehow, that's enough."
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            function TaskItem({ task, onToggle, onDelete, onEdit }) {
                const category = CATEGORIES[task.category];

                return (
                    <div className={`task-item ${task.completed ? 'completed' : ''}`}>
                        <div className={`task-checkbox ${task.completed ? 'checked' : ''}`} onClick={onToggle}>
                            {task.completed && '✓'}
                        </div>
                        <div className="task-content" onClick={() => onEdit && onEdit(task)} style={{cursor: onEdit ? 'pointer' : 'default'}}>
                            <div className="task-text">{task.text}</div>
                            <div className="task-category">{category.emoji} {category.name}</div>
                            {task.notes && <div className="task-notes-preview">📝 {task.notes}</div>}
                            <div className="task-badges">
                                {category.points > 0 && (
                                    <div className="badge badge-positive">+{category.points} pts</div>
                                )}
                                {category.points < 0 && (
                                    <div className="badge badge-negative">{category.points} pts</div>
                                )}
                                {category.points === 0 && (
                                    <div className="badge badge-neutral">0 pts</div>
                                )}
                            </div>
                        </div>
                        <div className="task-actions">
                            <button className="btn-small" onClick={onToggle}>
                                {task.completed ? 'Undo' : 'Done'}
                            </button>
                            <button className="btn-delete" onClick={onDelete}>
                                Delete
                            </button>
                        </div>
                    </div>
                );
            }

            function ResetModal({ isOpen, tasks: resetTasks, onClose, onAction }) {
                return (
                    <div className={`modal ${isOpen ? 'active' : ''}`}>
                        <div className="modal-content">
                            <div className="modal-title">Weekly Reset</div>
                            <div style={{ fontSize: '12px', color: '#666', marginBottom: '16px', lineHeight: '1.6' }}>
                                <strong>"What got done? What's still real? What can I kill?"</strong>
                                <br />
                                <br />
                                If a task has survived three resets without moving, it's not a task—it's a guilt souvenir. Throw it out.
                                <br />
                                <br />
                                Fifteen minutes of honest accounting beats seven days of productive-looking chaos.
                            </div>

                            <div className="reset-items">
                                {resetTasks.length === 0 ? (
                                    <div className="empty-state">
                                        <div className="empty-state-text">All tasks reviewed. You're all set!</div>
                                    </div>
                                ) : (
                                    resetTasks.map(task => (
                                        <div key={task.id} className="reset-item">
                                            <div className="reset-item-text">
                                                <strong>{task.text}</strong>
                                                <br />
                                                <span style={{ fontSize: '11px', color: '#999' }}>
                                                    {CATEGORIES[task.category]?.name}
                                                </span>
                                            </div>
                                            <div className="reset-action">
                                                <button
                                                    className="reset-btn-small"
                                                    onClick={() => onAction(task.id, 'keep')}
                                                >
                                                    Keep
                                                </button>
                                                <button
                                                    className="reset-btn-small"
                                                    onClick={() => onAction(task.id, 'reschedule')}
                                                >
                                                    Reschedule
                                                </button>
                                                <button
                                                    className="reset-btn-small"
                                                    onClick={() => onAction(task.id, 'kill')}
                                                >
                                                    Kill
                                                </button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>

                            <div className="modal-buttons">
                                <button className="btn-secondary" onClick={onClose}>
                                    Close
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }
        }

        // Error boundary
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, info) {
                console.error('App Error:', error, info);
            }
            render() {
                if (this.state.hasError) {
                    return React.createElement('div', {style: {padding: '40px', fontFamily: 'monospace', color: 'red'}},
                        React.createElement('h2', null, 'Something went wrong'),
                        React.createElement('pre', null, this.state.error?.toString()),
                        React.createElement('pre', null, this.state.error?.stack)
                    );
                }
                return this.props.children;
            }
        }

        // Render the app
        ReactDOM.render(<ErrorBoundary><GetShitDoneApp /></ErrorBoundary>, document.getElementById('root'));
    </script>
</body>
</html>
